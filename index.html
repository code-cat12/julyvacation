<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacation Countdown</title>
<style>
  @font-face {
    font-family: 'CustomFont';
    src: url('https://files.catbox.moe/wg28i5.otf') format('opentype');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'CustomFont', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    text-align: center;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/81bb4b165684019.640b6038d133e.gif') no-repeat center center;
    background-size: cover;
  }

  /* screens sit directly over the gif, no card */
  #welcome, #main {
    position: relative;
    z-index: 2;
    padding: 40px;
  }

  #main { display: none; }

  /* shared text style */
  .txt {
    color: #fff;
    -webkit-text-stroke: 5px #000;
    paint-order: stroke fill;
    text-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  /* welcome */
  #welcome-title {
    font-size: clamp(2rem, 8vw, 4.5rem);
  }

  #enter-text {
    font-size: clamp(1.2rem, 4vw, 2rem);
    margin-top: 24px;
    cursor: pointer;
    transition: transform 0.1s;
    display: inline-block;
  }

  #enter-text:hover  { transform: scale(1.05); }
  #enter-text:active { transform: scale(0.97); }

  /* title letters slide in once */
  @keyframes letterBounceRight {
    0%   { opacity: 0; transform: translateX(-50px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  @keyframes letterBounceLeft {
    0%   { opacity: 0; transform: translateX(50px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  #title {
    font-size: clamp(2.5rem, 9vw, 6rem);
    line-height: 1.05;
    display: inline-block;
  }

  #title .letter {
    display: inline-block;
    opacity: 0;
  }

  #title .space { display: inline-block; width: 0.35em; }

  #countdown {
    font-size: clamp(1.6rem, 5vw, 3rem);
    letter-spacing: 2px;
    margin-top: 20px;
  }

  #message {
    font-size: clamp(2rem, 8vw, 5rem);
    display: none;
  }

  #message .letter {
    display: inline-block;
    opacity: 0;
  }

  #message .space { display: inline-block; width: 0.35em; }

  @keyframes fall {
    to { transform: translateY(120vh) rotate(360deg); }
  }

  .emoji {
    position: fixed;
    top: -10vh;
    z-index: 5;
    user-select: none;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <audio id="music" src="https://file.garden/aeqRld7dt0EuhZM4/soundsurfer-beach-469016.mp3" loop></audio>

  <div id="welcome">
    <div id="welcome-title" class="txt">Welcome</div>
    <div id="enter-text" class="txt">Enter</div>
  </div>

  <div id="main">
    <div id="timer">
      <div id="title" class="txt"></div>
      <div id="countdown" class="txt">--d --h --m --s</div>
    </div>
    <div id="message" class="txt"></div>
  </div>

<script>
  const TARGET = new Date(Date.UTC(new Date().getFullYear(), 6, 4, 4, 0, 0));

  const countdownEl = document.getElementById('countdown');
  const timerEl     = document.getElementById('timer');
  const messageEl   = document.getElementById('message');
  const titleEl     = document.getElementById('title');
  const music       = document.getElementById('music');
  const welcomeEl   = document.getElementById('welcome');
  const mainEl      = document.getElementById('main');

  const EMOJIS = ['🏝️', '🌴', '☀️', '🌞', '🥥', '🌊', '🏖️', '🍍'];

  // Build letter spans
  function buildSpans(el, text) {
    el.innerHTML = '';
    [...text].forEach(ch => {
      if (ch === ' ') {
        el.appendChild(Object.assign(document.createElement('span'), { className: 'space' }));
      } else {
        const s = document.createElement('span');
        s.className = 'letter';
        s.textContent = ch;
        el.appendChild(s);
      }
    });
  }

  // Fire the slide-in animation once, staggered per letter
  function fireAnim(el, dir) {
    const letters = el.querySelectorAll('.letter');
    letters.forEach(s => { s.style.animation = 'none'; });
    void el.offsetWidth; // force reflow
    letters.forEach((s, i) => {
      s.style.animation = `letterBounce${dir} 0.5s ${i * 0.055}s forwards`;
    });
  }

  function animateText(el, text, dir = 'Right') {
    buildSpans(el, text);
    void el.offsetWidth;
    fireAnim(el, dir);
  }

  document.getElementById('enter-text').addEventListener('click', () => {
    music.play();
    welcomeEl.style.transition = 'opacity 0.5s';
    welcomeEl.style.opacity = '0';
    setTimeout(() => {
      welcomeEl.style.display = 'none';
      mainEl.style.display = 'block';
      buildSpans(titleEl, 'Countdown to Vacation');
      fireAnim(titleEl, 'Right');
      init();
    }, 500);
  });

  function tick() {
    const diff = TARGET - new Date();
    if (diff <= 0) { endCountdown(); return; }
    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff / 3600000) % 24);
    const mins  = Math.floor((diff / 60000) % 60);
    const secs  = Math.floor((diff / 1000) % 60);
    countdownEl.textContent = days + 'd ' + hours + 'h ' + mins + 'm ' + secs + 's';
  }

  function spawnEmoji() {
    const span = document.createElement('span');
    span.className = 'emoji';
    span.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    span.style.left = Math.random() * 100 + 'vw';
    span.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
    const dur = 3 + Math.random() * 3;
    span.style.animation = 'fall ' + dur + 's linear forwards';
    document.body.appendChild(span);
    setTimeout(() => span.remove(), dur * 1000);
  }

  function rainEmojis() {
    const iv = setInterval(spawnEmoji, 120);
    setTimeout(() => clearInterval(iv), 5000);
  }

  let ended = false;
  function endCountdown() {
    if (ended) return;
    ended = true;
    clearInterval(timerLoop);
    timerEl.style.display = 'none';
    messageEl.style.display = 'block';
    animateText(messageEl, 'Enjoy your vacation! 🏝️☀️🥥');
    rainEmojis();
  }

  let timerLoop;
  function init() {
    if (new Date() >= TARGET) {
      endCountdown();
    } else {
      tick();
      timerLoop = setInterval(tick, 1000);
    }
  }
</script>
</body>
</html>
